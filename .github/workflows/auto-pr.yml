name: Auto Create PR

on:
  push:
    branches-ignore:
      - master

jobs:
  create-pr:
    name: Create PR to master
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Create or skip PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh pr list --head "$GITHUB_REF_NAME" --base master --json number -q '.[0].number')
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already exists for $GITHUB_REF_NAME, skipping."
            exit 0
          fi

          gh pr create \
            --base master \
            --head "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME → master" \
            --body "Auto-created by CI from branch \`$GITHUB_REF_NAME\`."
