name: Pipeline · Code Review

on:
  pull_request:
    branches: ['*']
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'
  SHARED_MEMORY_REPO: yihua-zhuo/agent-job-shared-memory
  SHARED_MEMORY_BRANCH: main

jobs:
  code-review:
    name: Code Review
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up claude
        run: |
          if ! command -v claude &>/dev/null; then
            npm install -g @anthropic-ai/claude-code
          fi

      - name: Clone shared-memory
        env:
          SM_TOKEN: ${{ secrets.COMMIT_GITHUB_TOKEN || github.token }}
        run: |
          git clone --branch "$SHARED_MEMORY_BRANCH" \
            "https://x-access-token:${SM_TOKEN}@github.com/${SHARED_MEMORY_REPO}.git" \
            shared-memory

      - name: Run Claude Code Review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DIFF_FILE: /tmp/pr-diff.txt
          CODE_REVIEW_RESULT_PATH: shared-memory/results/code-review-result.json
          DIFF_REMOTE: origin
          DIFF_BASE_REF: ${{ github.event_name == 'pull_request' && github.base_ref || github.event.before }}
          DIFF_HEAD_REF: ${{ github.event_name == 'pull_request' && github.head_ref || github.sha }}
        run: |
          python3 scripts/ci/run_claude_code_review.py

      - name: Post PR line comments
        if: github.event_name == 'pull_request'
        env:
          # MUST use the PAT (not the workflow-issued GITHUB_TOKEN). The GraphQL
          # `resolveReviewThread` mutation we call inside post_pr_line_comments.py
          # rejects the github-actions[bot] integration with
          # "Resource not accessible by integration" — it requires a real
          # collaborator identity, which the PAT provides.
          GITHUB_TOKEN: ${{ secrets.COMMIT_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          CODE_REVIEW_RESULT_PATH: shared-memory/results/code-review-result.json
        run: |
          python3 scripts/ci/post_pr_line_comments.py

      - name: Trigger automatic PR fix for critical findings
        env:
          GH_TOKEN: ${{ secrets.COMMIT_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.COMMIT_GITHUB_TOKEN }}
          CODE_REVIEW_RESULT_PATH: shared-memory/results/code-review-result.json
          PR_HEAD_REF: ${{ github.head_ref }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail

          if [ -z "${GH_TOKEN:-}" ]; then
            echo "COMMIT_GITHUB_TOKEN is not configured; cannot dispatch fix-pr-comments.yml" >&2
            exit 1
          fi

          ISSUE_ID="$(python3 - <<'PY'
          import json
          import os
          import re
          import sys
          from pathlib import Path

          result_path = Path(os.environ["CODE_REVIEW_RESULT_PATH"])
          if not result_path.exists():
              print("code review result file not found", file=sys.stderr)
              sys.exit(2)

          result = json.loads(result_path.read_text(encoding="utf-8") or "{}")
          critical = result.get("critical_issues") or []
          if not critical:
              sys.exit(0)

          candidates = [
              os.environ.get("PR_HEAD_REF", ""),
              os.environ.get("PR_BODY", ""),
          ]
          patterns = [
              r"(?:^|/)auto/issue-(\d+)(?:$|[^0-9])",
              r"\b(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)\b",
              r"\bissue-(\d+)\b",
              r"#(\d+)",
          ]
          for text in candidates:
              for pattern in patterns:
                  match = re.search(pattern, text or "", re.IGNORECASE)
                  if match:
                      print(match.group(1))
                      sys.exit(0)

          print("critical findings found, but issue id could not be inferred", file=sys.stderr)
          sys.exit(2)
          PY
          )"

          if [ -z "${ISSUE_ID:-}" ]; then
            echo "No critical findings; skipping fix-pr-comments.yml dispatch."
            exit 0
          fi

          echo "Critical findings detected; dispatching fix-pr-comments.yml for issue #${ISSUE_ID}."
          python3 scripts/ci/trigger_fix_for_issue.py "${ISSUE_ID}"

