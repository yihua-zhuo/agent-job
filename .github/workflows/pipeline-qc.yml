# trigger workflow_dispatch sync
name: Pipeline · QC

on:
  schedule:
    - cron: "20 */2 * * *"        # every 2 hours at :20
  push:
    branches: [develop]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'
  SHARED_MEMORY_REPO: yihua-zhuo/agent-job-shared-memory
  SHARED_MEMORY_BRANCH: main

jobs:
  qc:
    name: Quality Control
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Clone shared-memory
        env:
          SM_TOKEN: ${{ secrets.COMMIT_GITHUB_TOKEN || github.token }}
        run: |
          git clone --branch "$SHARED_MEMORY_BRANCH" \
            "https://x-access-token:${SM_TOKEN}@github.com/${SHARED_MEMORY_REPO}.git" \
            shared-memory

      - name: Install deps
        run: pip install -q -e ".[dev]"

      - name: Install lint tools
        run: pip install -q ruff mypy flake8 pylint

      - name: Check code-review gate
        id: gate
        run: |
          python3 -c "
          import json, os
          from datetime import datetime, timezone
          path = 'shared-memory/results/code-review-result.json'
          if not os.path.exists(path):
              print('CR_GATE=skip')
          else:
              with open(path) as f:
                  data = json.load(f)
              gen = datetime.fromisoformat(data['generated_at'].rstrip('Z')).replace(tzinfo=timezone.utc)
              age_h = (datetime.now(timezone.utc) - gen).total_seconds() / 3600
              if data.get('status') == 'pass' and age_h < 24:
                  print('CR_GATE=ok')
              else:
                  print('CR_GATE=skip')
          " >> $GITHUB_OUTPUT

      - name: Run QC checks
        if: steps.gate.outputs.CR_GATE == 'ok' || github.event_name == 'workflow_dispatch'
        id: qc-checks
        env:
          PYTHONPATH: src
        run: |
          # Style: try ruff first, fall back to compileall
          if python3 -m ruff check src/ > /tmp/ruff-output.txt 2>&1; then
            STYLE_TOOL=ruff
          else
            python3 -c "import compileall; import sys; sys.exit(0 if compileall.compile_dir('src', quiet=1) else 1)" > /tmp/compileall-output.txt 2>&1
            STYLE_TOOL=compileall
          fi
          echo "STYLE_TOOL=$STYLE_TOOL" >> $GITHUB_ENV
          STYLE_RC=$?

          # Types
          if python3 -m mypy src/ > /tmp/mypy-output.txt 2>&1; then
            TYPE_RC=0
          else
            TYPE_RC=$?
          fi
          echo "TYPE_RC=$TYPE_RC" >> $GITHUB_ENV

          # Docs
          README_OK=$([ -f README.md ] && echo 1 || echo 0)
          echo "README_OK=$README_OK" >> $GITHUB_ENV

          echo "QC_STYLE=$STYLE_TOOL" >> $GITHUB_OUTPUT
          echo "QC_PASS=$([ $STYLE_RC -eq 0 ] && echo 1 || echo 0)" >> $GITHUB_OUTPUT

      - name: Write QC result envelope
        if: steps.gate.outputs.CR_GATE == 'ok' || github.event_name == 'workflow_dispatch'
        run: |
          mkdir -p shared-memory/results
          python3 -c "
          import json
          from datetime import datetime

          style_rc = int('${STYLE_RC:-1}')
          type_rc = int('${TYPE_RC:-1}')
          readme_ok = int('${README_OK:-0}')
          style_tool = '${STYLE_TOOL:-unknown}'

          signals = {
              'style': {'tool': style_tool, 'returncode': style_rc},
              'types': {'tool': 'mypy', 'returncode': type_rc},
              'docs': {'readme_exists': bool(readme_ok)}
          }

          # Simple pass/fail: style must pass, mypy must pass (or rc==0), docs must exist
          status = 'pass'
          blocking = []
          if style_rc != 0:
              status = 'fail'
              blocking.append(f'{style_tool} reported errors')
          if type_rc not in (0, None):
              status = 'fail'
              blocking.append('mypy reported errors')
          if not readme_ok:
              status = 'fail'
              blocking.append('README.md missing')

          from datetime import datetime
          result = {
              'agent': 'qc',
              'status': status,
              'generated_at': datetime.utcnow().isoformat() + 'Z',
              'details': {
                  'llm_status': status,
                  'llm_parsed': {
                      'status': status,
                      'blocking': blocking,
                      'non_blocking': [],
                      'summary': f'QC gate: style={style_tool}, mypy={\"pass\" if type_rc==0 else \"fail\"}, docs={\"ok\" if readme_ok else \"missing\"}'
                  },
                  'local': {'signals': signals}
              }
          }
          with open('shared-memory/results/qc-result.json','w') as f:
              json.dump(result, f, indent=2)
          print(f'QC result: {status}')
          print(f'Blocking: {blocking}')
          "

      - name: Skip if gate not met
        if: steps.gate.outputs.CR_GATE != 'ok' && github.event_name != 'workflow_dispatch'
        run: echo "Code-review gate not met — QC deferred"

      - name: Push shared-memory
        if: always()
        env:
          SM_TOKEN: ${{ secrets.COMMIT_GITHUB_TOKEN || github.token }}
        run: |
          cd shared-memory
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "pipeline(qc): update results"
          git push \
            "https://x-access-token:${SM_TOKEN}@github.com/${SHARED_MEMORY_REPO}.git" \
            "$SHARED_MEMORY_BRANCH"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pipeline-qc-result
          path: shared-memory/results/qc-result.json
          retention-days: 3

      - name: Create GitHub Issue on QC failure
        if: steps.gate.outputs.CR_GATE == 'ok'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          ARTIFACT_PATH: shared-memory/results/qc-result.json
        run: python3 scripts/ci/create_qc_issue.py
