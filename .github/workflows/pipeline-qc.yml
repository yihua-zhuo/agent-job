name: Pipeline · QC

on:
  schedule:
    - cron: "20 */2 * * *"        # every 2 hours at :20
  push:
    branches: [develop]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'

jobs:
  qc:
    name: Quality Control
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install lint tools
        run: pip install -q ruff mypy flake8 pylint compileall

      - name: Download code-review artifact
        uses: actions/download-artifact@v4
        with:
          name: pipeline-code-review-result
          path: ./artifacts
        continue-on-error: true

      - name: Check code-review gate
        id: gate
        run: |
          python3 -c "
          import json, os
          from datetime import datetime, timezone
          path = 'artifacts/code-review-result.json'
          if not os.path.exists(path):
              print('CR_GATE=skip')
          else:
              with open(path) as f:
                  data = json.load(f)
              gen = datetime.fromisoformat(data['generated_at'].rstrip('Z'))
              age_h = (datetime.now(timezone.utc) - gen).total_seconds() / 3600
              if data.get('status') == 'pass' and age_h < 24:
                  print('CR_GATE=ok')
              else:
                  print('CR_GATE=skip')
          " >> $GITHUB_OUTPUT

      - name: Run QC checks
        if: steps.gate.outputs.CR_GATE == 'ok'
        id: qc-checks
        run: |
          mkdir -p artifacts

          # Style: try ruff first, fall back to compileall
          if python3 -m ruff check src/ > artifacts/ruff-output.txt 2>&1; then
            STYLE_TOOL=ruff
          else
            python3 -c "import compileall; import sys; sys.exit(0 if compileall.compile_dir('src', quiet=1) else 1)" > artifacts/compileall-output.txt 2>&1
            STYLE_TOOL=compileall
          fi
          echo "STYLE_TOOL=$STYLE_TOOL" >> $GITHUB_ENV
          STYLE_RC=$?

          # Types
          if python3 -m mypy src/ > artifacts/mypy-output.txt 2>&1; then
            TYPE_RC=0
          else
            TYPE_RC=$?
          fi
          echo "TYPE_RC=$TYPE_RC" >> $GITHUB_ENV

          # Docs
          README_OK=$([ -f README.md ] && echo 1 || echo 0)
          echo "README_OK=$README_OK" >> $GITHUB_ENV

          echo "QC_STYLE=$STYLE_TOOL" >> $GITHUB_OUTPUT
          echo "QC_PASS=$([ $STYLE_RC -eq 0 ] && echo 1 || echo 0)" >> $GITHUB_OUTPUT

      - name: Write QC result envelope
        if: steps.gate.outputs.CR_GATE == 'ok'
        run: |
          mkdir -p artifacts
          python3 -c "
          import json
          from datetime import datetime

          style_rc = int('${STYLE_RC:-1}')
          type_rc = int('${TYPE_RC:-1}')
          readme_ok = int('${README_OK:-0}')
          style_tool = '${STYLE_TOOL:-unknown}'

          signals = {
              'style': {'tool': style_tool, 'returncode': style_rc},
              'types': {'tool': 'mypy', 'returncode': type_rc},
              'docs': {'readme_exists': bool(readme_ok)}
          }

          # Simple pass/fail: style must pass, mypy must pass (or rc==0), docs must exist
          status = 'pass'
          blocking = []
          if style_rc != 0:
              status = 'fail'
              blocking.append(f'{style_tool} reported errors')
          if type_rc not in (0, None):
              status = 'fail'
              blocking.append('mypy reported errors')
          if not readme_ok:
              status = 'fail'
              blocking.append('README.md missing')

          from datetime import datetime
          result = {
              'agent': 'qc',
              'status': status,
              'generated_at': datetime.utcnow().isoformat() + 'Z',
              'details': {
                  'llm_status': status,
                  'llm_parsed': {
                      'status': status,
                      'blocking': blocking,
                      'non_blocking': [],
                      'summary': f'QC gate: style={style_tool}, mypy={\"pass\" if type_rc==0 else \"fail\"}, docs={\"ok\" if readme_ok else \"missing\"}'
                  },
                  'local': {'signals': signals}
              }
          }
          with open('artifacts/qc-result.json','w') as f:
              json.dump(result, f, indent=2)
          print(f'QC result: {status}')
          print(f'Blocking: {blocking}')
          "

      - name: Skip if gate not met
        if: steps.gate.outputs.CR_GATE != 'ok'
        run: |
          mkdir -p artifacts
          python3 -c "
          import json
          from datetime import datetime
          result = {'agent':'qc','status':'skipped','generated_at':datetime.utcnow().isoformat()+'Z','details':{'reason':'code-review not green in last 24h'}}
          with open('artifacts/qc-result.json','w') as f:
              json.dump(result,f,indent=2)
          "

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pipeline-qc-result
          path: artifacts/qc-result.json
          retention-days: 3

      - name: Create GitHub Issue on QC failure
        if: steps.gate.outputs.CR_GATE == 'ok'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 -c "
          import json, os, subprocess
          from datetime import datetime
          path = 'artifacts/qc-result.json'
          if not os.path.exists(path):
              print('No QC result')
              sys.exit(0)
          with open(path) as f:
              data = json.load(f)
          if data.get('status') == 'fail':
              blocking = data.get('details',{}).get('llm_parsed',{}).get('blocking',[])
              body = '''**Pipeline Stage:** qc
**Status:** FAIL — quality gate rejected
**Triggered:** {t}

## Blocking Issues
{blocks}

_See pipeline-run: {run}_
'''.format(
                  t=datetime.utcnow().isoformat(),
                  blocks='\\n'.join(f'- {b}' for b in blocking) if blocking else '- (none)',
                  run=os.environ.get('GITHUB_RUN_ID','N/A')
              )
              cmd = ['gh','issue','create',
                     '--title','❌ QC Gate Failed — ' + datetime.utcnow().strftime('%Y-%m-%d %H:00'),
                     '--body', body,
                     '--label','pipeline','qc','automated']
              result = subprocess.run(cmd, capture_output=True, text=True)
              if result.returncode == 0:
                  print('Issue created:', result.stdout.strip())
              else:
                  print('Error:', result.stderr)
          else:
              print(f'QC status={data.get(\"status\")} — no issue needed')
          " || echo "Issue script failed"
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
