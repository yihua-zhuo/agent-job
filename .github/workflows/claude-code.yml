name: Claude · Code Review

# ─── Triggers ────────────────────────────────────────────────────────────────
on:
  # @claude mention in any issue or PR comment
  issue_comment:
    types: [ created ]

  # @claude mention in a PR review thread
  pull_request_review_comment:
    types: [ created ]

  # Auto-review every new / updated PR
  pull_request:
    types: [ opened, synchronize, reopened ]

  # Full review submitted (approved / changes-requested / commented)
  pull_request_review:
    types: [ submitted ]

# ─── Permissions ─────────────────────────────────────────────────────────────
permissions:
  contents: write        # Read code, push fix commits
  pull-requests: write   # Submit reviews, add review comments, approve/request changes
  issues: write          # Create issues, add labels, post comments
  checks: write          # Post check-run status on PRs
  actions: read          # Read CI logs so Claude can debug failures

# ─── Jobs ────────────────────────────────────────────────────────────────────
jobs:

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 1 — Respond to @claude mentions (issues, PRs, review threads)
  # ════════════════════════════════════════════════════════════════════════════
  claude-respond:
    name: Claude · Respond to mention
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          additional_permissions: |
            actions: read
          claude_args: |
            --model claude-sonnet-4-5
            --max-turns 15
            --allowedTools "Bash(npm install),Bash(npm test),Bash(npm run lint),Edit,Replace,Read,mcp__github__create_issue,mcp__github__add_issue_comment,mcp__github__create_pull_request_review,mcp__github__create_pull_request_review_comment"
            --system-prompt "You are a senior engineer assistant embedded in GitHub. When asked to review code: post a formal PR review (approve / request-changes / comment) with inline comments on specific lines. When you spot a bug, security issue, or missing test that is out of scope for the current PR: create a GitHub Issue with a clear title, reproduction steps, and suggested fix. Always prefer actionable, concise feedback. Never post vague comments."

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 2 — Auto code-review every PR
  # ════════════════════════════════════════════════════════════════════════════
  claude-review:
    name: Claude · Auto PR review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      checks: write
      actions: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history so Claude can diff properly

      - name: Run Claude Code – PR review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

          # Direct prompt sent automatically (no @claude mention needed)
          prompt: |
            Please review this pull request.
            1. Read every changed file in the diff.
            2. Submit a GitHub Pull Request Review (use "COMMENT", "APPROVE", or
               "REQUEST_CHANGES" as appropriate).
            3. Add inline review comments on specific lines for any bugs,
               security issues, style violations, or missing tests you find.
            4. For any significant bug or missing feature that is out of scope for
               this PR, create a separate GitHub Issue so it is tracked.
            5. End your review with a short summary comment on the PR.

          claude_args: |
            --model claude-sonnet-4-5
            --max-turns 20
            --allowedTools "Read,Bash(git diff),Bash(git log),mcp__github__create_issue,mcp__github__add_issue_comment,mcp__github__create_pull_request_review,mcp__github__create_pull_request_review_comment,mcp__github__list_pull_request_files,mcp__github__get_pull_request"

          additional_permissions: |
            actions: read

# ─── Notes ───────────────────────────────────────────────────────────────────
# Required GitHub Secrets:
#
#   ANTHROPIC_API_KEY  →  Your Anthropic API key (sk-ant-...)
#
# GitHub tools Claude can use (built-in to claude-code-action):
#   mcp__github__create_issue                   → open a new issue
#   mcp__github__add_issue_comment              → comment on an issue
#   mcp__github__create_pull_request_review     → submit approve/request-changes/comment
#   mcp__github__create_pull_request_review_comment → inline line comment on PR diff
#   mcp__github__list_pull_request_files        → list files changed in a PR
#   mcp__github__get_pull_request               → read PR metadata