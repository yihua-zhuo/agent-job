name: Dev Agent CI

on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:
    branches: [main, develop]

env:
  MODEL: MiniMax-M2.7
  PYTHON_VERSION: '3.11'

jobs:
  coordinator:
    name: Coordinator Agent
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Parse Task
        run: python3 scripts/coordinator.py parse

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: coordinator
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -q pytest pytest-cov bcrypt openpyxl
      - run: PYTHONPATH=. pytest tests/unit/ -v --cov=src --cov-report=xml
      - uses: codecov/codecov-action@v4
        if: always()

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-test
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3
      mock-api:
        image: nginx:alpine
        ports:
          - 8080:80
        volumes:
          - ./configs/mock-api.conf:/etc/nginx/conf.d/default.conf
        options: >-
          --health-cmd wget --no-verbose --tries=1 --spider http://localhost/health || exit 0
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -q pytest pytest-cov requests psycopg2-binary
      - run: sleep 10 && pytest tests/integration/ -v

  code-review:
    name: Code Review
    runs-on: ubuntu-latest
    needs: [coordinator, unit-test]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Code Review Agent
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python3 agents/code_review/review_agent.py

  quality-check:
    name: Quality Control
    runs-on: ubuntu-latest
    needs: code-review
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - run: pip install -q pylint flake8 mypy
      - run: |
          pylint src/ --output-format=text --score=no
          flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics || true
          mypy src/ --ignore-missing-imports || true

  build:
    name: Build & Package
    runs-on: ubuntu-latest
    needs: [unit-test, quality-check]
    steps:
      - uses: actions/checkout@v4
      - run: python3 -m py_compile src/**/*.py
      - run: pip install -q build
      - run: python3 -m build

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - run: echo "Deploy triggered" && python3 scripts/deploy.py