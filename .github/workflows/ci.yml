name: Dev Agent CI

on:
  pull_request:
    branches: [master, develop]
  push:
    branches: [master, develop, feature/**]

env:
  MODEL: MiniMax-M2.2
  PYTHON_VERSION: '3.11'

jobs:
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/testdb
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -q ".[dev]"
      - run: PYTHONPATH=src pytest tests/unit/ -v --cov=src --cov-report=xml
      - uses: codecov/codecov-action@v4
        if: always()

  code-review:
    name: Code Review
    runs-on: ubuntu-latest
    needs: unit-test
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Set up claude
        run: |
          if ! command -v claude &>/dev/null; then
            npm install -g @anthropic-ai/claude-code
          fi
      - name: Run Code Review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DIFF_FILE: /tmp/pr-diff.txt
          CODE_REVIEW_RESULT_PATH: /tmp/code-review-result.json
          DIFF_REMOTE: origin
          DIFF_BASE_REF: ${{ github.event_name == 'pull_request' && github.base_ref || github.event.before }}
          DIFF_HEAD_REF: ${{ github.event_name == 'pull_request' && github.head_ref || github.sha }}
        run: python3 scripts/ci/run_claude_code_review.py

  quality-check:
    name: Quality Control
    runs-on: ubuntu-latest
    needs: code-review
    continue-on-error: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -q ".[dev]"
      - run: |
          ruff check src/
          mypy src/ --ignore-missing-imports

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: quality-check
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - run: python3 scripts/deploy.py
