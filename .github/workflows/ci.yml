name: Dev Agent CI

on:
  pull_request:
    branches: [master, develop]
  # Re-validate on master after merges. Scoped narrowly to avoid the
  # push+pull_request duplication we hit before — feature branches still
  # only run via the PR trigger.
  push:
    branches: [master]

env:
  MODEL: MiniMax-M2.7
  PYTHON_VERSION: '3.11'

jobs:
  coordinator:
    name: Coordinator Agent
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Parse Task
        run: python3 scripts/coordinator.py parse

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: coordinator
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/testdb
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -q ".[dev]"
      - run: PYTHONPATH=src pytest tests/unit/ -v --cov=src --cov-report=xml
      - uses: codecov/codecov-action@v4
        if: always()

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-test
    env:
      DATABASE_URL: postgresql+psycopg2://test_user:test_pass@localhost:5432/test_db
      TEST_DATABASE_URL: postgresql+asyncpg://test_user:test_pass@localhost:5432/test_db
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -q ".[dev]" requests
      - run: docker compose -f configs/docker-compose.test.yml up -d --wait
      - run: PYTHONPATH=src pytest tests/integration/ -v
      - if: always()
        run: docker compose -f configs/docker-compose.test.yml down

  migration-drift:
    name: Migration Drift Check
    runs-on: ubuntu-latest
    needs: unit-test
    env:
      DATABASE_URL: postgresql+asyncpg://test_user:test_pass@localhost:5432/alembic_dev
      PYTHONPATH: src
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -q ".[dev]"
      - name: Start Postgres
        run: docker compose -f configs/docker-compose.test.yml up -d --wait test-db
      - name: Create clean alembic_dev DB
        # MUST be a separate DB from test_db. test_db is populated by
        # Base.metadata.create_all in tests/integration/conftest.py, which
        # yields an empty autogen diff and silently masks real drift.
        run: |
          docker compose -f configs/docker-compose.test.yml exec -T test-db \
            psql -U test_user -d postgres -c "DROP DATABASE IF EXISTS alembic_dev;"
          docker compose -f configs/docker-compose.test.yml exec -T test-db \
            psql -U test_user -d postgres -c "CREATE DATABASE alembic_dev;"
      - name: Apply migrations to head
        run: alembic upgrade head
      - name: Autogenerate drift check
        id: drift
        run: |
          set -e
          alembic revision --autogenerate -m drift_check
          DRIFT_FILE=$(ls -t alembic/versions/*_drift_check.py | head -1)
          echo "drift_file=$DRIFT_FILE" >> "$GITHUB_OUTPUT"
          # Empty autogen body has only `pass` (or comment markers). Any real
          # operation appears as `op.<something>(...)` — that's our signal.
          if grep -E "^\s*op\." "$DRIFT_FILE" > /dev/null 2>&1; then
            echo "has_drift=1" >> "$GITHUB_OUTPUT"
          else
            echo "has_drift=0" >> "$GITHUB_OUTPUT"
          fi
      - name: Report drift (fails the job)
        if: steps.drift.outputs.has_drift == '1'
        run: |
          DRIFT_FILE="${{ steps.drift.outputs.drift_file }}"
          echo "::error title=Schema drift detected::ORM models contain changes not captured by any Alembic migration."
          echo ""
          echo "=== AUTOFIX-INSTRUCTIONS ==="
          echo "What this means:"
          echo "  Some src/db/models/*.py declarations don't have a matching"
          echo "  alembic/versions/*.py migration. dev/prod DBs that apply"
          echo "  migrations will 500 with UndefinedTable/UndefinedColumn"
          echo "  errors at request time. Integration tests miss this because"
          echo "  tests/integration/conftest.py uses Base.metadata.create_all"
          echo "  instead of alembic upgrade head."
          echo ""
          echo "How to fix:"
          echo "  1. Read the autogenerated diff below — it describes the gap"
          echo "     between the ORM and the current migration head."
          echo "  2. Hand-write a new migration in alembic/versions/ that"
          echo "     captures ONLY the intended changes. Do NOT commit the"
          echo "     raw autogen output — it routinely includes noise:"
          echo "       - non-null columns without server_default (will fail"
          echo "         on populated tables — add server_default or backfill)"
          echo "       - FK re-creations that silently drop ondelete=CASCADE"
          echo "       - unrelated index churn"
          echo "  3. The new migration's down_revision must point to the"
          echo "     current head ($(alembic current 2>/dev/null | tail -1 | awk '{print $1}'))."
          echo "  4. Verify both directions work:"
          echo "       alembic upgrade head && alembic downgrade -1 && alembic upgrade head"
          echo "  5. Re-run this job by pushing — the second autogen should"
          echo "     produce an empty diff (only 'pass' in upgrade/downgrade)."
          echo ""
          echo "See CLAUDE.md > Alembic Migrations for the full workflow."
          echo ""
          echo "=== AUTOGENERATED DIFF (alembic/versions/$(basename "$DRIFT_FILE")) ==="
          cat "$DRIFT_FILE"
          echo "=== END AUTOGENERATED DIFF ==="
          exit 1
      - name: Tear down Postgres
        if: always()
        run: docker compose -f configs/docker-compose.test.yml down -v || true

  code-review:
    name: Code Review
    runs-on: ubuntu-latest
    needs: [coordinator, unit-test]
    if: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Code Review Agent
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python3 docs/agents/code_review/review_agent.py

  quality-check:
    name: Quality Control
    runs-on: ubuntu-latest
    needs: code-review
    continue-on-error: false
    steps:
      - uses: actions/checkout@v4
      - run: pip install -q ruff mypy
      - run: |
          ruff check src/
          mypy src/ --ignore-missing-imports

  build:
    name: Build & Package
    runs-on: ubuntu-latest
    needs: [unit-test, quality-check]
    steps:
      - uses: actions/checkout@v4
      - run: python3 -m py_compile src/**/*.py
      - run: pip install -q build
      - run: python3 -m build

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - run: echo "Deploy triggered" && python3 scripts/deploy.py
