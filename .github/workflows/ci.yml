name: CI

on:
  push:
    branches: [master, develop]

env:
  PYTHON_VERSION: '3.11'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - run: pip install -q ".[dev]"

      - run: PYTHONPATH=src pytest tests/ -m "not integration" -v

      - run: ruff check src/

      - uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: .pytest_cache/

  code-review:
    name: Code Review
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Run Code Review Agent
        env:
          CLAUDE_GATEWAY_URL: ${{ vars.CLAUDE_GATEWAY_URL }}
          CLAUDE_GATEWAY_TOKEN: ${{ secrets.CLAUDE_GATEWAY_TOKEN }}
        run: python3 scripts/ci/run_code_review.py
