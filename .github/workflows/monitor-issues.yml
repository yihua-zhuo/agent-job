name: Monitor · Open Issues

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

# Prevent overlapping runs if a previous tick is still processing issues —
# avoids double-labelling / double-commenting on the same issue.
concurrency:
  group: monitor-issues
  cancel-in-progress: false

env:
  PYTHON_VERSION: '3.11'

jobs:
  validate:
    name: Validate open issues
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up claude
        run: |
          if ! command -v claude &>/dev/null; then
            npm install -g @anthropic-ai/claude-code
          fi

      - name: Validate open issues
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MAX_ISSUES_PER_RUN: '5'
        run: python3 scripts/ci/validate_open_issues.py
