name: Implement · Ready Issues

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Specific ready issue # to implement. Leave blank to take the oldest ready issue from the queue.'
        required: false
        type: string
        default: ''

# Implementation runs are long (≤60 min) and stateful (claim → plan → build →
# test → commit). Serialise so two ticks can't both grab the same issue or
# both push the same branch.
concurrency:
  group: implement-ready-issues
  cancel-in-progress: false

env:
  PYTHON_VERSION: '3.11'

jobs:
  implement:
    name: Implement next ready issue
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use the PAT so the auto-opened PR fires downstream workflows
          # (Dev Agent CI, code review). GITHUB_TOKEN-triggered events don't.
          token: ${{ secrets.COMMIT_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up claude
        run: |
          if ! command -v claude &>/dev/null; then
            npm install -g @anthropic-ai/claude-code
          fi

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Stage 1 — claim & plan
        id: plan
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Empty for scheduled runs; set by workflow_dispatch to target a
          # specific issue picked from the local CLI.
          ISSUE_NUMBER: ${{ inputs.issue_number }}
        run: python3 scripts/ci/claim_and_plan_issue.py

      - name: Skip if no issue claimed
        if: steps.plan.outputs.issue_number == ''
        run: |
          echo "No ready issue to implement — done."

      - name: Create implementation branch
        if: steps.plan.outputs.issue_number != ''
        run: |
          git checkout -b "${{ steps.plan.outputs.branch }}"
          mkdir -p "$(dirname "${{ steps.plan.outputs.plan_path }}")"
          git add "${{ steps.plan.outputs.plan_path }}"
          git commit -m "plan: implementation plan for issue #${{ steps.plan.outputs.issue_number }}"

      - name: Install Python dependencies
        if: steps.plan.outputs.issue_number != ''
        run: |
          set -e
          python -m pip install --upgrade pip
          # Fallback chain — succeeds on the first one that works. If ALL fail,
          # set -e propagates the error so the job stops here instead of
          # silently moving on to a doomed test stage.
          pip install -e ".[dev]" 2>/dev/null || pip install -e . || pip install -r requirements.txt
          pip install pytest pytest-asyncio ruff sqlalchemy asyncpg fastapi

      - name: Start docker compose (test DB)
        if: steps.plan.outputs.issue_number != ''
        run: |
          docker compose -f configs/docker-compose.test.yml up -d test-db
          # Wait for postgres to accept connections
          for i in {1..30}; do
            if docker compose -f configs/docker-compose.test.yml exec -T test-db pg_isready -U test_user > /dev/null 2>&1; then
              echo "test-db ready after ${i} polls"
              break
            fi
            sleep 2
          done
          # Final gate: if the loop exhausted without success, fail loudly here
          # instead of letting integration tests blow up with an opaque error.
          if ! docker compose -f configs/docker-compose.test.yml exec -T test-db pg_isready -U test_user > /dev/null 2>&1; then
            echo "test-db did not become ready within timeout" >&2
            docker compose -f configs/docker-compose.test.yml logs test-db || true
            exit 1
          fi

      - name: Stage 2 — execute implementation
        if: steps.plan.outputs.issue_number != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          ISSUE_NUMBER: ${{ steps.plan.outputs.issue_number }}
          PLAN_PATH: ${{ steps.plan.outputs.plan_path }}
          DATABASE_URL: postgresql+asyncpg://test_user:test_pass@localhost:5432/test_db
          PYTHONPATH: src
          # 60 min cap. Leaves ~30 min of the 90-min job budget for Stage 1
          # (~2 min), docker + deps setup (~10 min), Stage 3 self-review,
          # and the commit/PR step.
          CLAUDE_TIMEOUT_SECONDS: '3600'
        run: python3 scripts/ci/execute_implementation.py

      - name: Stage 3 — self-review & fix
        if: steps.plan.outputs.issue_number != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          ISSUE_NUMBER: ${{ steps.plan.outputs.issue_number }}
          PLAN_PATH: ${{ steps.plan.outputs.plan_path }}
          DATABASE_URL: postgresql+asyncpg://test_user:test_pass@localhost:5432/test_db
          PYTHONPATH: src
        run: python3 scripts/ci/self_review_implementation.py

      - name: Post-Stage-2 diagnostics (working tree + branch state)
        if: steps.plan.outputs.issue_number != ''
        run: |
          echo "=== git status -uall ==="
          git status -uall
          echo
          echo "=== Commits on branch beyond origin/master ==="
          git log --oneline origin/master..HEAD || echo "(unable to compare; origin/master may be missing)"
          echo
          echo "=== Files changed vs origin/master ==="
          git diff --stat origin/master..HEAD || true

      # Note: no separate test gate here. The execute step instructs Claude to
      # run ruff + unit + integration tests itself and iterate until green,
      # and the PR opened below is re-tested by `ci.yml` on pull_request before
      # it can be merged. A duplicate gate just doubles CI minutes.

      - name: Commit changes and open PR
        if: steps.plan.outputs.issue_number != '' && success()
        env:
          GH_TOKEN: ${{ secrets.COMMIT_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ steps.plan.outputs.branch }}"
          ISSUE_NUMBER="${{ steps.plan.outputs.issue_number }}"
          PLAN_PATH="${{ steps.plan.outputs.plan_path }}"

          # Stage anything Claude left in the working tree, then commit it.
          # Claude may also have committed during its own session, in which
          # case the working tree is already clean — handle both cases.
          git add -A
          if ! git diff --cached --quiet; then
            git commit \
              -m "feat: implement issue #${ISSUE_NUMBER}" \
              -m "Closes #${ISSUE_NUMBER}" \
              -m "Auto-implemented by Claude Code following ${PLAN_PATH}. Stage 2 implemented + ran tests until green; Stage 3 self-reviewed against codereview.md and fixed any rule violations found; PR-time CI re-verifies."
          fi

          # Decide whether to push by looking at the branch vs origin/master,
          # NOT at the staging index. That way, commits Claude made during
          # its own Stage 2 session still count — without this, a session
          # where Claude self-committed would leave a clean working tree
          # and we'd wrongly exit thinking nothing happened.
          #
          # The ':!.plans/*' pathspec excludes the plan file: a branch whose
          # only diff vs master is the plan itself isn't worth a PR.
          if git diff --quiet origin/master..HEAD -- . ':!.plans/*'; then
            echo "No implementation changes vs origin/master (only the plan, if any) — not opening a PR."
            exit 0
          fi

          git push -u origin "$BRANCH"
          PR_BODY=$(printf 'Closes #%s\n\nPlan: `%s`\n\nThis PR was auto-implemented by Claude Code in three stages:\n\n1. **Plan** — Claude wrote a detailed implementation plan to `%s`.\n2. **Implement** — Claude executed the plan, ran `ruff check src/` + the unit and integration test suites, and iterated until all three were green.\n3. **Self-review** — Claude reviewed its own diff against `codereview.md` (the project review checklist) and fixed any rule violations found, re-running the test suite if any changes were made.\n\nPR-time CI (`Dev Agent CI`) re-verifies independently before this PR is mergeable.\n\nPlease review before merging.' "$ISSUE_NUMBER" "$PLAN_PATH" "$PLAN_PATH")
          gh pr create \
            --title "Auto: implement issue #${ISSUE_NUMBER}" \
            --body "$PR_BODY" \
            --base master \
            --head "$BRANCH" \
            --label "automated" || echo "PR may already exist for $BRANCH"

      - name: Report failure on issue
        if: steps.plan.outputs.issue_number != '' && failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUMBER="${{ steps.plan.outputs.issue_number }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          BODY=$(printf '⚠️ Auto-implementation failed. Workflow run: %s\n\nThe `wip` label remains on this issue so it is not re-attempted automatically. Remove the `wip` label to allow the next cron tick to retry.' "$RUN_URL")
          gh issue comment "$ISSUE_NUMBER" --body "$BODY"

      - name: Stop docker compose
        if: always()
        run: docker compose -f configs/docker-compose.test.yml down -v || true
