[project]
name = "dev-agent-system"
version = "0.1.0"
description = "Multi-Agent CRM Development System"
requires-python = ">=3.11"

[project.dependencies]
flask = ">=3.0"
flask-cors = ">=4.0"
gunicorn = "^21.0"
# Database
sqlalchemy = "^2.0"
asyncpg = ">=0.29"
psycopg2-binary = "^2.9"
alembic = "^1.13"
# Utils
bcrypt = ">=4.1"
python-dotenv = "^1.0"
PyJWT = ">=2.8"
pymysql = "^1.1"

[project.optional-dependencies]
dev = ["pytest>=7.0", "pylint>=3.0", "mypy>=1.0"]