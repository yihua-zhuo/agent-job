[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "dev-agent-system"
version = "0.1.0"
description = "Multi-Agent CRM Development System"
requires-python = ">=3.11"
dependencies = [
    "flask>=3.0",
    "flask-cors>=4.0",
    "gunicorn>=21.0,<26.0",
    # Database
    "sqlalchemy>=2.0,<3.0",
    "asyncpg>=0.29",
    "psycopg2-binary>=2.9,<3.0",
    "alembic>=1.13,<2.0",
    # Utils
    "bcrypt>=4.1",
    "python-dotenv>=1.0,<2.0",
    "PyJWT>=2.8",
    "pymysql>=1.1,<2.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.23",
    "pytest-cov>=4.0",
    "pylint>=3.0",
    "mypy>=1.0",
    "openpyxl>=3.1",
]

[tool.setuptools.packages.find]
where = ["src"]
